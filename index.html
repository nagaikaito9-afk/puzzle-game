<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D パズルメーカー</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        
        <div id="login-screen" class="screen">
            <h1>3D Puzzle Maker</h1>
            <h2>ログイン</h2>
            <input type="text" id="login-id" placeholder="アカウント名">
            <input type="password" id="login-pass" placeholder="パスワード">
            <div>
                <label style="font-size: 14px; cursor: pointer;">
                    <input type="checkbox" onchange="togglePass('login-pass')"> パスワードを表示
                </label>
            </div>
            <button onclick="login()">ログイン</button>
            <br><br>
            <button onclick="showScreen('register-screen')">新しいアカウントを作成</button>
        </div>

        <div id="register-screen" class="screen hidden">
            <h1>アカウント作成</h1>
            <p style="color:yellow; font-size:12px;">※いたずら防止のため、1つの端末につき5つまで作成可能です</p>
            <input type="text" id="reg-id" placeholder="新しいアカウント名">
            <input type="password" id="reg-pass" placeholder="パスワード (6文字以上)">
            <div>
                <label style="font-size: 14px; cursor: pointer;">
                    <input type="checkbox" onchange="togglePass('reg-pass')"> パスワードを表示
                </label>
            </div>
            <button onclick="register()">作成してログイン</button>
            <button onclick="showScreen('login-screen')">戻る</button>
        </div>

        <div id="home-screen" class="screen hidden">
            <h1>ホーム</h1>
            <p>ようこそ、<span id="player-name-display"></span> さん！</p>
            <button onclick="startEditor()">コースを作成</button>
            <button onclick="showScreen('play-select-screen')">コースをプレイ</button>
            <button onclick="showFriendsScreen()">フレンド</button>
            <button onclick="showScreen('settings-screen')">設定</button>
        </div>

        <div id="play-select-screen" class="screen hidden">
            <h2>プレイするコースを選ぶ</h2>
            <button onclick="showCourseList('world', 'new')">世界のコース (新着順)</button>
            <button onclick="showCourseList('world', 'popular')">世界のコース (人気順)</button>
            <button onclick="showCourseList('my', 'new')">自分のコース</button>
            <br><br>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>

        <div id="friends-screen" class="screen hidden">
            <h2>フレンド</h2>
            <button onclick="sendFriendRequest()">＋ アカウント名でリクエスト送信</button>
            
            <h3 style="margin-bottom: 5px;">📥 リクエスト一覧</h3>
            <div id="friend-requests-container" class="list-container" style="max-height: 15vh; margin-bottom: 15px;"></div>

            <h3 style="margin-bottom: 5px;">🤝 フレンド一覧</h3>
            <div id="friends-list-container" class="list-container" style="max-height: 25vh;"></div>
            
            <br>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>

        <div id="course-list-screen" class="screen hidden">
            <h2 id="course-list-title">コース一覧</h2>
            <input type="text" id="course-search" placeholder="コース名・作者名で検索" oninput="filterCourses()" style="width:80%; display:none; margin-bottom:10px;">
            <div id="course-list-container" class="list-container"></div>
            <br>
            <button onclick="goBackFromList()">戻る</button>
        </div>

        <div id="course-detail-screen" class="screen hidden">
            <h2 id="detail-title">コース名</h2>
            <p>作者: <span id="detail-author"></span></p>
            <p>❤️ <span id="detail-likes">0</span> | プレイ: <span id="detail-plays">0</span> | クリア率: <span id="detail-clear-rate">0</span>%</p>
            <button onclick="likeCourse()" id="like-btn">❤️ いいね！</button>
            <button onclick="startPlayFromDetail()">プレイ開始</button>
            <button onclick="editCourseFromDetail()" style="background-color:#f0ad4e;">🛠 エディタで開く(編集)</button>
            <br><br>
            <button onclick="deleteCourse()" id="delete-course-btn" style="background-color:#d9534f; display:none;">🗑 このコースを削除</button>
            <br><br>
            <div id="comment-section" class="list-container" style="height:150px;"></div>
            <select id="comment-select">
                <option value="おもしろい！">おもしろい！</option>
                <option value="難しい..">難しい..</option>
                <option value="楽しい！">楽しい！</option>
                <option value="神コース！">神コース！</option>
                <option value="クリアできた！">クリアできた！</option>
                <option value="惜しい！">惜しい！</option>
                <option value="いいね！">いいね！</option>
                <option value="天才！">天才！</option>
                <option value="デザインが好き！">デザインが好き！</option>
                <option value="また遊びたい！">また遊びたい！</option>
            </select>
            <button onclick="postComment()" id="post-comment-btn">コメント送信</button>
            <br>
            <button onclick="showScreen('course-list-screen')">戻る</button>
        </div>

        <div id="settings-screen" class="screen hidden">
            <h2>設定</h2>
            <label>BGM 音量: <span id="bgm-val">50</span>%
                <input type="range" id="bgm-volume" min="0" max="100" value="50" oninput="updateVolume()">
            </label>
            <br><br>
            <label>効果音 音量: <span id="se-val">50</span>%
                <input type="range" id="se-volume" min="0" max="100" value="50" oninput="updateVolume()">
            </label>
            <br><br>
            <button onclick="deleteAccount()" style="background-color:#d9534f;">このアカウントを完全に削除する</button>
            <br><br>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>

        <div id="editor-screen" class="screen hidden">
            <div class="hud">
                <span>モード: エディタ</span>
                <span style="font-size:12px; margin-left:10px;">(Shift+右クリックでカメラ移動)</span>
                <br>
                <button onclick="testPlay()">完成（チェック）</button>
                <button onclick="showScreen('home-screen')">ホームに戻る</button>
            </div>
            <div class="toolbar">
                <button onclick="selectBlock('normal')">通常</button>
                <button onclick="selectBlock('color-red')">赤色</button>
                <button onclick="selectBlock('color-blue')">青色</button>
                <button onclick="selectBlock('color-green')">緑色</button>
                <button onclick="selectBlock('color-pink')">桃色</button>
                <button onclick="selectBlock('wood')">木材</button>
                <button onclick="selectBlock('glass')">ガラス</button>
                <button onclick="selectBlock('fake')">すり抜け</button>
                <button onclick="selectBlock('jump')">ジャンプ</button>
                <button onclick="selectBlock('conveyor')">コンベア</button>
                <button onclick="selectBlock('speed')">ダッシュ</button>
                <button onclick="selectBlock('slow')">泥</button>
                <button onclick="selectBlock('key')">カギ</button>
                <button onclick="selectBlock('door')">ドア</button>
                <button onclick="selectBlock('death')">即死</button>
                <button onclick="selectBlock('goal')">ゴール</button>
                <button onclick="selectBlock('start')">スタート</button>
                <button onclick="selectBlock('eraser')" style="background-color:#d9534f;">消しゴム</button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="hud" id="play-hud">
                <span>プレイ中 <span style="font-size:12px;">(Vキーで一人称/三人称切替)</span></span>
                <button onclick="quitPlay()">やめる</button>
            </div>

            <div id="clear-message" class="hidden">
                <h2>クリア！</h2>
                <button id="btn-save-local" onclick="saveLocalCourse()" class="hidden">保存する</button>
                <button id="btn-publish" onclick="publishCourse()" class="hidden">世界に公開する</button>
                <button id="btn-back-home" onclick="quitPlay()" class="hidden">戻る</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
